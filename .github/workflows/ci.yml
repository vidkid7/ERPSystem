name: Ultimate ERP CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NODE_VERSION: '20'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: erp_user
          POSTGRES_PASSWORD: erp_password
          POSTGRES_DB: UltimateERP_Test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Restore dependencies
        run: dotnet restore UltimateERP.slnx

      - name: Build
        run: dotnet build UltimateERP.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test UltimateERP.slnx --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=UltimateERP_Test;Username=erp_user;Password=erp_password"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: './TestResults/**/coverage.cobertura.xml'

      - name: Build frontend
        working-directory: client
        run: |
          npm ci
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ultimate-erp-api:${{ github.sha }} .

      - name: Tag Docker image
        run: |
          docker tag ultimate-erp-api:${{ github.sha }} ultimate-erp-api:latest
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ultimate-erp-api:${{ github.sha }} ultimate-erp-api:production
          else
            docker tag ultimate-erp-api:${{ github.sha }} ultimate-erp-api:develop
          fi
